<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <title>Frontend Mentor | Blog preview card</title>
    <style>
        .attribution { font-size: 0.6875rem; text-align: center; }
        .attribution a { color: hsl(228, 45%, 44%); }
    </style>
</head>
<body>
    <div class="card">
        <img id="article-illustration" src="./Images/illustration-article.svg" alt="Article Illustration">
        <div class="box">
            <p id="article-category">Learning</p>   
        </div>
        <p style="margin-left: 6%;;">Published 21 Dec 2023</p>
        <h2 style="font-weight: 800;margin-left: 6%;font-size: 1.65rem;margin-top: 2%;">HTML & CSS foundations</h2>
        <p id="article">These languages are the backbone of every website, defining structure, content, and presentation.</p>   
        <p id="author">Greg Hooper</p>
    </div>
    <footer class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
        Coded by <a href="#">Katia</a>.
    </footer>
</body>
</html>
